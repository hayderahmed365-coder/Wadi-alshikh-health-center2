<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>وادي الشيخ | النظام المحاسبي الصحي - Firebase</title>
    
    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, get, child, update, remove, onValue, off } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // ====================== إعدادات Firebase الخاصة بك ======================
        // ⚠️ استبدل هذه القيم بإعدادات مشروعك الحقيقية من Firebase Console
        // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBTteGPj222LVaQkEif52itVA7KI2fuxDE",
  authDomain: "wadi-alshikh-health-cent-edc8e.firebaseapp.com",
  databaseURL: "https://wadi-alshikh-health-cent-edc8e-default-rtdb.firebaseio.com",
  projectId: "wadi-alshikh-health-cent-edc8e",
  storageBucket: "wadi-alshikh-health-cent-edc8e.firebasestorage.app",
  messagingSenderId: "22323939322",
  appId: "1:22323939322:web:6c4d52c550e865536b0643",
  measurementId: "G-X2JH8CBMHH"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // تصدير الدوال لاستخدامها في النطاق العام
        window.db = db;
        window.auth = auth;
        window.firebaseSignIn = signInWithEmailAndPassword;
        window.firebaseSignUp = createUserWithEmailAndPassword;
        window.firebaseSignOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
        window.ref = ref;
        window.set = set;
        window.get = get;
        window.child = child;
        window.update = update;
        window.remove = remove;
        window.onValue = onValue;
        window.off = off;
    </script>
    
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background: #f0fdf4; }
        .nav-bottom-btn.active { background: #0f766e; color: white; box-shadow: 0 4px 12px rgba(15,118,110,0.3); }
        .login-gradient { background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(15,118,110,0.2); border-color: #0f766e; outline: none; }
        .toast-success {
            position: fixed; bottom: 80px; left: 20px; right: 20px; background: #0f766e; color: white;
            padding: 12px 20px; border-radius: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 100; text-align: center; font-weight: 500; animation: fadeInOut 3s forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); }
        }
    </style>
</head>
<body class="font-cairo">

<!-- شاشة تسجيل الدخول -->
<div id="authScreen" class="fixed inset-0 z-50 flex items-center justify-center login-gradient overflow-y-auto py-10">
    <div class="bg-white rounded-3xl shadow-2xl p-6 w-11/12 max-w-md">
        <div class="text-center mb-4">
            <div class="bg-primary/10 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-3">
                <i class="fas fa-clinic-medical text-4xl text-primary"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-gray-800">مرحباً بعودتك</h2>
            <p class="text-gray-500 text-sm">مركز وادي الشيخ الصحي - الصلوعاب</p>
            <p class="text-gray-400 text-xs">المتمة، نهر النيل، السودان</p>
        </div>
        <div id="loginForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">البريد الإلكتروني</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute right-3 top-3 text-gray-400"></i>
                    <input type="email" id="loginEmail" placeholder="example@email.com" class="w-full border border-gray-300 rounded-xl py-3 pr-10 pl-4 input-focus transition">
                </div>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">كلمة المرور</label>
                <div class="relative">
                    <i class="fas fa-lock absolute right-3 top-3 text-gray-400"></i>
                    <input type="password" id="loginPassword" placeholder="••••••" class="w-full border border-gray-300 rounded-xl py-3 pr-10 pl-4 input-focus transition">
                    <button type="button" onclick="togglePassword('loginPassword', 'loginToggleIcon')" class="absolute left-3 top-3 text-gray-400"><i id="loginToggleIcon" class="fas fa-eye"></i></button>
                </div>
            </div>
            <button onclick="attemptLogin()" class="w-full bg-primary text-white py-3 rounded-xl font-bold shadow-lg hover:shadow-xl transition transform hover:scale-[1.02] active:scale-95 mt-4">
                <i class="fas fa-sign-in-alt ml-2"></i> دخول
            </button>
            <p class="text-center text-sm text-gray-500">ليس لديك حساب؟ <button onclick="showRegisterForm()" class="text-primary font-bold">إنشاء حساب جديد</button></p>
        </div>
        <div id="registerForm" class="space-y-4 hidden">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">الاسم الكامل</label>
                <input type="text" id="regFullname" placeholder="مثال: أحمد حيدر" class="w-full border rounded-xl p-3 input-focus">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">البريد الإلكتروني</label>
                <input type="email" id="regEmail" placeholder="example@email.com" class="w-full border rounded-xl p-3 input-focus">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">كلمة المرور</label>
                <input type="password" id="regPassword" placeholder="••••••" class="w-full border rounded-xl p-3 input-focus">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">تأكيد كلمة المرور</label>
                <input type="password" id="regConfirmPassword" placeholder="••••••" class="w-full border rounded-xl p-3 input-focus">
            </div>
            <button onclick="registerNewUser()" class="w-full bg-primary text-white py-3 rounded-xl font-bold">إنشاء حساب</button>
            <button onclick="hideRegisterForm()" class="w-full text-gray-500 text-sm">العودة لتسجيل الدخول</button>
        </div>
        <p class="text-center text-xs text-gray-400 mt-6">© 2025 وادي الشيخ - الصلوعاب</p>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="mainApp" style="display: none;">
    <div class="bg-gradient-to-l from-primary to-teal-700 text-white p-5 shadow-lg sticky top-0 z-20">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-extrabold tracking-wide"><i class="fas fa-clinic-medical ml-2"></i>وادي الشيخ</h1>
                <p class="text-xs text-teal-100">مرحباً، <span id="currentUserName"></span></p>
                <p class="text-[10px] text-teal-200">الصلوعاب - المتمة - نهر النيل</p>
            </div>
            <div class="flex gap-2">
                <button onclick="showUserManagement()" id="adminOnlyBtn" class="bg-white/20 hover:bg-white/30 p-2 rounded-full transition hidden"><i class="fas fa-users-cog text-xl"></i></button>
                <button onclick="showAddUserPanel()" id="addUserBtn" class="bg-white/20 hover:bg-white/30 p-2 rounded-full transition hidden"><i class="fas fa-user-plus text-xl"></i></button>
                <button onclick="logout()" class="bg-white/20 hover:bg-white/30 p-2 rounded-full transition"><i class="fas fa-sign-out-alt text-xl"></i></button>
            </div>
        </div>
    </div>

    <main class="container mx-auto px-3 py-5" id="appContent">
        <div class="text-center py-10">جاري تحميل البيانات...</div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-gray-200 shadow-2xl rounded-t-3xl z-30">
        <div class="flex justify-around items-center p-2 flex-wrap">
            <button data-section="dashboard" class="nav-bottom-btn flex flex-col items-center p-2 rounded-2xl transition-all duration-200 text-gray-600"><i class="fas fa-tachometer-alt text-xl"></i><span class="text-xs mt-1">الرئيسية</span></button>
            <button data-section="patients" class="nav-bottom-btn flex flex-col items-center p-2 rounded-2xl text-gray-600"><i class="fas fa-users text-xl"></i><span class="text-xs mt-1">المرضى</span></button>
            <button data-section="exams" class="nav-bottom-btn flex flex-col items-center p-2 rounded-2xl text-gray-600"><i class="fas fa-microscope text-xl"></i><span class="text-xs mt-1">فحوصات</span></button>
            <button data-section="inventory" class="nav-bottom-btn flex flex-col items-center p-2 rounded-2xl text-gray-600"><i class="fas fa-pills text-xl"></i><span class="text-xs mt-1">المخزون</span></button>
            <button data-section="accounting" class="nav-bottom-btn flex flex-col items-center p-2 rounded-2xl text-gray-600"><i class="fas fa-coins text-xl"></i><span class="text-xs mt-1">المالية</span></button>
            <button data-section="appointments" class="nav-bottom-btn flex flex-col items-center p-2 rounded-2xl text-gray-600"><i class="fas fa-calendar-check text-xl"></i><span class="text-xs mt-1">مواعيد</span></button>
            <button data-section="reports" class="nav-bottom-btn flex flex-col items-center p-2 rounded-2xl text-gray-600"><i class="fas fa-chart-simple text-xl"></i><span class="text-xs mt-1">تقارير</span></button>
        </div>
    </div>
</div>

<!-- مودالات (نفس السابق) -->
<div id="addUserPanel" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 overflow-y-auto py-10">
    <div class="bg-white rounded-2xl p-6 w-11/12 max-w-md mx-auto">
        <h3 class="font-bold text-xl mb-4"><i class="fas fa-user-plus text-primary ml-2"></i>إضافة موظف جديد</h3>
        <div class="space-y-3">
            <input type="text" id="newUserFullname" placeholder="الاسم الكامل" class="w-full border rounded-xl p-3">
            <input type="email" id="newUserEmail" placeholder="البريد الإلكتروني" class="w-full border rounded-xl p-3">
            <input type="password" id="newUserPassword" placeholder="كلمة المرور" class="w-full border rounded-xl p-3">
            <input type="password" id="newUserConfirmPassword" placeholder="تأكيد كلمة المرور" class="w-full border rounded-xl p-3">
            <select id="newUserRole" class="w-full border rounded-xl p-3">
                <option value="user">موظف عادي</option>
                <option value="admin">مدير (صلاحية كاملة)</option>
            </select>
            <div class="flex gap-2 mt-4">
                <button onclick="addNewUser()" class="bg-primary text-white flex-1 py-2 rounded-xl">إضافة</button>
                <button onclick="closeAddUserPanel()" class="bg-gray-300 flex-1 py-2 rounded-xl">إلغاء</button>
            </div>
        </div>
    </div>
</div>

<div id="userManagementModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 overflow-y-auto py-10">
    <div class="bg-white rounded-2xl p-5 w-11/12 max-w-lg mx-auto">
        <h3 class="font-bold text-xl mb-4"><i class="fas fa-users-cog text-primary ml-2"></i>إدارة المستخدمين</h3>
        <div id="usersList" class="space-y-2 max-h-96 overflow-y-auto mb-4">جاري التحميل...</div>
        <button onclick="closeUserManagement()" class="bg-gray-300 w-full p-2 rounded-xl">إغلاق</button>
    </div>
</div>

<script>
    // ====================== المتغيرات العامة ======================
    let currentUser = null;
    let userRole = null;
    
    // البيانات المحملة من Realtime Database
    let patients = [];
    let inventory = [];
    let invoices = [];
    let appointments = [];
    let examinations = [];
    let payments = [];
    let usersList = [];

    // دوال المساعدة
    function showToast(msg, isSuccess = true) {
        const toast = document.createElement('div');
        toast.className = 'toast-success';
        toast.style.background = isSuccess ? '#0f766e' : '#b91c1c';
        toast.innerHTML = `<i class="fas ${isSuccess ? 'fa-check-circle' : 'fa-exclamation-circle'} ml-2"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    window.togglePassword = (inputId, iconId) => {
        let inp = document.getElementById(inputId);
        let icon = document.getElementById(iconId);
        if (inp.type === 'password') {
            inp.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            inp.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    };

    // ====================== المصادقة ======================
    window.showRegisterForm = () => {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
    };
    window.hideRegisterForm = () => {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
    };

    window.registerNewUser = async () => {
        const fullname = document.getElementById('regFullname').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPassword').value;
        if (!fullname || !email || !password) return alert('جميع الحقول مطلوبة');
        if (password !== confirm) return alert('كلمة المرور غير متطابقة');
        if (password.length < 6) return alert('كلمة المرور 6 أحرف على الأقل');
        try {
            const userCred = await firebaseSignUp(auth, email, password);
            // حفظ بيانات المستخدم في Realtime Database
            await set(ref(db, 'users/' + userCred.user.uid), {
                fullname, email, role: 'user', createdAt: new Date().toISOString()
            });
            showToast('تم إنشاء الحساب بنجاح، يمكنك تسجيل الدخول الآن');
            hideRegisterForm();
        } catch (err) {
            alert('خطأ: ' + err.message);
        }
    };

    window.attemptLogin = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        try {
            await firebaseSignIn(auth, email, password);
        } catch (err) {
            alert('فشل تسجيل الدخول: ' + err.message);
        }
    };

    window.logout = async () => {
        await firebaseSignOut(auth);
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('authScreen').style.display = 'flex';
        currentUser = null;
        userRole = null;
    };

    // ====================== مراقبة حالة المستخدم ======================
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // جلب بيانات المستخدم من Realtime Database
            const userRef = ref(db, 'users/' + user.uid);
            const snap = await get(userRef);
            if (snap.exists()) {
                currentUser = { uid: user.uid, email: user.email, ...snap.val() };
                userRole = currentUser.role;
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('currentUserName').innerText = currentUser.fullname;
                document.getElementById('adminOnlyBtn').classList.toggle('hidden', userRole !== 'admin');
                document.getElementById('addUserBtn').classList.toggle('hidden', userRole !== 'admin');
                await loadAllData();
                initializeApp();
                setupRealtimeListeners();
            } else {
                await firebaseSignOut(auth);
            }
        } else {
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }
    });

    // ====================== تحميل البيانات ======================
    async function loadAllData() {
        try {
            const dbRef = ref(db);
            const snapshot = await get(child(dbRef, '/'));
            if (snapshot.exists()) {
                const data = snapshot.val();
                patients = data.patients ? Object.entries(data.patients).map(([id, val]) => ({ id, ...val })) : [];
                inventory = data.inventory ? Object.entries(data.inventory).map(([id, val]) => ({ id, ...val })) : [];
                invoices = data.invoices ? Object.entries(data.invoices).map(([id, val]) => ({ id, ...val })) : [];
                appointments = data.appointments ? Object.entries(data.appointments).map(([id, val]) => ({ id, ...val })) : [];
                examinations = data.examinations ? Object.entries(data.examinations).map(([id, val]) => ({ id, ...val })) : [];
                payments = data.payments ? Object.entries(data.payments).map(([id, val]) => ({ id, ...val })) : [];
                if (userRole === 'admin') {
                    usersList = data.users ? Object.entries(data.users).map(([id, val]) => ({ id, ...val })) : [];
                }
            }
        } catch (err) {
            console.error(err);
            showToast('خطأ في تحميل البيانات', false);
        }
    }

    // استماع فوري للتحديثات
    function setupRealtimeListeners() {
        const paths = ['patients', 'inventory', 'invoices', 'appointments', 'examinations'];
        paths.forEach(path => {
            const listRef = ref(db, path);
            onValue(listRef, (snap) => {
                const data = snap.val();
                if (path === 'patients') patients = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
                else if (path === 'inventory') inventory = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
                else if (path === 'invoices') invoices = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
                else if (path === 'appointments') appointments = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
                else if (path === 'examinations') examinations = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
                if (currentSection === path || currentSection === 'dashboard') renderSection(currentSection);
            });
        });
    }

    // ====================== عرض الواجهة ======================
    let currentSection = 'dashboard';
    function renderSection(section) {
        currentSection = section;
        const container = document.getElementById('appContent');
        if (section === 'dashboard') container.innerHTML = renderDashboard();
        else if (section === 'patients') container.innerHTML = renderPatients();
        else if (section === 'exams') container.innerHTML = renderExams();
        else if (section === 'inventory') container.innerHTML = renderInventory();
        else if (section === 'accounting') container.innerHTML = renderAccounting();
        else if (section === 'appointments') container.innerHTML = renderAppointments();
        else if (section === 'reports') container.innerHTML = renderReports();
    }

    function renderDashboard() {
        const today = new Date().toISOString().slice(0,10);
        const todayApps = appointments.filter(a => a.date === today).length;
        const todayRevenue = invoices.filter(inv => inv.date === today && inv.paid).reduce((s,i)=> s + i.total, 0) || 0;
        const monthRevenue = invoices.filter(inv => inv.date?.startsWith(new Date().toISOString().slice(0,7)) && inv.paid).reduce((s,i)=> s + i.total,0) || 0;
        return `
        <div class="space-y-5 pb-20">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="bg-white p-4 rounded-2xl shadow border-r-4 border-primary"><p class="text-gray-500 text-sm">إيرادات اليوم</p><p class="text-2xl font-bold">${todayRevenue} ج.س</p></div>
                <div class="bg-white p-4 rounded-2xl shadow border-r-4 border-teal-500"><p class="text-gray-500 text-sm">إيرادات الشهر</p><p class="text-2xl font-bold">${monthRevenue} ج.س</p></div>
                <div class="bg-white p-4 rounded-2xl shadow border-r-4 border-blue-500"><p class="text-gray-500 text-sm">إجمالي المرضى</p><p class="text-2xl font-bold">${patients.length}</p></div>
                <div class="bg-white p-4 rounded-2xl shadow border-r-4 border-amber-500"><p class="text-gray-500 text-sm">مواعيد اليوم</p><p class="text-2xl font-bold">${todayApps}</p></div>
            </div>
            <div class="bg-white rounded-2xl p-4 shadow"><p class="text-center text-gray-500">👋 مرحباً ${currentUser?.fullname} - ${userRole==='admin'?'مدير':'موظف'}</p></div>
        </div>`;
    }

    function renderPatients() {
        return `
        <div class="space-y-4 pb-20">
            ${userRole==='admin' ? `<button onclick="openPatientModal()" class="bg-primary text-white px-5 py-2 rounded-xl shadow"><i class="fas fa-plus"></i> مريض جديد</button>` : ''}
            <div class="bg-white rounded-2xl shadow overflow-hidden">
                <table class="min-w-full text-sm">
                    <thead class="bg-gray-100"><tr><th class="p-2">الاسم</th><th>العمر</th><th>الهاتف</th><th></th></tr></thead>
                    <tbody>${patients.map(p => `<tr><td class="p-2">${p.name}</td><td>${p.age}</td><td>${p.phone}</td><td>${userRole==='admin'?`<button onclick="deletePatient('${p.id}')" class="text-red-500"><i class="fas fa-trash"></i></button>`:''}</td></tr>`).join('')}</tbody>
                </table>
            </div>
        </div>`;
    }

    function renderExams() {
        return `<div class="bg-white p-4 rounded-2xl shadow pb-20"><h3>الفحوصات</h3>${userRole==='admin'?`<button onclick="addExamUI()" class="bg-primary text-white px-4 py-2 rounded-xl my-3">فحص جديد</button>`:''}<div>${examinations.map(e=>`<div class="border p-3"><b>${e.patientName}</b> - ${e.type}<br>${e.diagnosis||'قيد الانتظار'}</div>`).join('')}</div></div>`;
    }

    function renderInventory() {
        return `<div class="bg-white p-4 rounded-2xl shadow pb-20"><h3>المخزون</h3>${userRole==='admin'?`<button onclick="openAddDrugModal()" class="bg-primary text-white px-3 py-1 rounded my-2">إضافة دواء</button>`:''}<table class="w-full text-sm">${inventory.map(d=>`<tr><td>${d.name}</td><td>${d.quantity}</td><td>${d.price} ج.س</td></tr>`).join('')}</table></div>`;
    }

    function renderAccounting() {
        return `<div class="bg-white p-4 rounded-2xl shadow pb-20"><h3>الفواتير</h3>${userRole==='admin'?`<button onclick="createInvoiceUI()" class="bg-primary text-white px-4 py-2 rounded my-2">فاتورة جديدة</button>`:''}${invoices.map(i=>`<div>${i.patientName} - ${i.total} ج.س ${i.paid?'✅':'⏳'} ${userRole==='admin'?`<button onclick="deleteInvoice('${i.id}')">حذف</button>`:''}</div>`).join('')}</div>`;
    }

    function renderAppointments() {
        return `<div class="bg-white p-4 rounded-2xl shadow pb-20"><h3>المواعيد</h3>${userRole==='admin'?`<button onclick="addAppointmentUI()" class="bg-primary text-white px-4 py-2 rounded my-2">حجز موعد</button>`:''}${appointments.map(a=>`<div>${a.patientName} - ${a.date} ${a.time}</div>`).join('')}</div>`;
    }

    function renderReports() {
        return `<div class="bg-white p-5 rounded-2xl shadow pb-20"><h3>تقارير</h3><button onclick="exportReportToPDF()" class="bg-gray-800 text-white px-5 py-2 rounded-xl">تصدير PDF</button></div>`;
    }

    window.exportReportToPDF = () => { showToast('سيتم تصدير التقرير إلى PDF'); };

    // دوال العمليات (سيتم ملؤها لاحقًا - حاليًا نعرض الهيكل)
    window.openPatientModal = () => {};
    window.deletePatient = async (id) => { await remove(ref(db, 'patients/' + id)); };
    // ... أضف باقي الدوال حسب الحاجة

    // ====================== تهيئة التطبيق ======================
    function initializeApp() {
        renderSection('dashboard');
        document.querySelectorAll('.nav-bottom-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let section = btn.getAttribute('data-section');
                document.querySelectorAll('.nav-bottom-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderSection(section);
            });
        });
        document.querySelector('.nav-bottom-btn[data-section="dashboard"]')?.classList.add('active');
    }

    // دوال إدارة المستخدمين
    window.showAddUserPanel = () => document.getElementById('addUserPanel').classList.remove('hidden');
    window.closeAddUserPanel = () => document.getElementById('addUserPanel').classList.add('hidden');
    window.addNewUser = async () => { /* إنشاء مستخدم جديد */ };
    window.showUserManagement = async () => { /* عرض قائمة المستخدمين */ };
    window.closeUserManagement = () => document.getElementById('userManagementModal').classList.add('hidden');
</script>
</body>
</html>
