<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>مركز وادي الشيخ الصحي | نظام الإدارة</title>
    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, get, child, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKXAEj0z5iJkLZGekGp7mI6bAq7QRy7jQ",
            authDomain: "wadi-alshikh.firebaseapp.com",
            databaseURL: "https://wadi-alshikh-default-rtdb.firebaseio.com",
            projectId: "wadi-alshikh",
            storageBucket: "wadi-alshikh.firebasestorage.app",
            messagingSenderId: "804963090046",
            appId: "1:804963090046:web:d4bad811a6eddc6dfd622f",
            measurementId: "G-DYY88DEC6S"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        window.db = db; window.auth = auth;
        window.signIn = signInWithEmailAndPassword;
        window.signUp = createUserWithEmailAndPassword;
        window.signOutUser = signOut;
        window.onAuthChange = onAuthStateChanged;
        window.ref = ref; window.set = set; window.get = get;
        window.child = child; window.update = update; window.remove = remove;
        window.onValue = onValue;
    </script>
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background: #f0fdf4; }
        .nav-bottom-btn.active { background: #0f766e; color: white; box-shadow: 0 4px 12px rgba(15,118,110,0.3); }
        .login-gradient { background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%); }
        .toast-success {
            position: fixed; bottom: 80px; left: 20px; right: 20px; background: #0f766e; color: white;
            padding: 12px 20px; border-radius: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 100; text-align: center; animation: fadeInOut 3s forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); }
        }
    </style>
</head>
<body class="font-cairo">

<!-- شاشة تسجيل الدخول -->
<div id="authScreen" class="fixed inset-0 z-50 flex items-center justify-center login-gradient overflow-y-auto py-10">
    <div class="bg-white rounded-3xl shadow-2xl p-6 w-11/12 max-w-md">
        <div class="text-center mb-4">
            <div class="bg-teal-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-3">
                <i class="fas fa-clinic-medical text-4xl text-primary"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-gray-800">مرحباً بعودتك</h2>
            <p class="text-gray-500 text-sm">مركز وادي الشيخ الصحي - الصلوعاب</p>
            <p class="text-gray-400 text-xs">المتمة، نهر النيل، السودان</p>
        </div>
        <div id="loginForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">البريد الإلكتروني</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute right-3 top-3 text-gray-400"></i>
                    <input type="email" id="loginEmail" placeholder="example@email.com" class="w-full border border-gray-300 rounded-xl py-3 pr-10 pl-4">
                </div>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">كلمة المرور</label>
                <div class="relative">
                    <i class="fas fa-lock absolute right-3 top-3 text-gray-400"></i>
                    <input type="password" id="loginPassword" placeholder="••••••" class="w-full border border-gray-300 rounded-xl py-3 pr-10 pl-4">
                    <button type="button" onclick="togglePassword('loginPassword','loginToggleIcon')" class="absolute left-3 top-3 text-gray-400"><i id="loginToggleIcon" class="fas fa-eye"></i></button>
                </div>
            </div>
            <button onclick="attemptLogin()" class="w-full bg-primary text-white py-3 rounded-xl font-bold shadow-lg">دخول</button>
            <p class="text-center text-sm text-gray-500">ليس لديك حساب؟ <button onclick="showRegisterForm()" class="text-primary font-bold">إنشاء حساب جديد</button></p>
        </div>
        <div id="registerForm" class="space-y-4 hidden">
            <div><label class="block text-gray-700 text-sm font-bold mb-2">الاسم الكامل</label><input type="text" id="regFullname" class="w-full border rounded-xl p-3"></div>
            <div><label class="block text-gray-700 text-sm font-bold mb-2">البريد الإلكتروني</label><input type="email" id="regEmail" class="w-full border rounded-xl p-3"></div>
            <div><label class="block text-gray-700 text-sm font-bold mb-2">كلمة المرور</label><input type="password" id="regPassword" class="w-full border rounded-xl p-3"></div>
            <div><label class="block text-gray-700 text-sm font-bold mb-2">تأكيد كلمة المرور</label><input type="password" id="regConfirmPassword" class="w-full border rounded-xl p-3"></div>
            <button onclick="registerNewUser()" class="w-full bg-primary text-white py-3 rounded-xl font-bold">إنشاء حساب</button>
            <button onclick="hideRegisterForm()" class="w-full text-gray-500 text-sm">العودة لتسجيل الدخول</button>
        </div>
        <p class="text-center text-xs text-gray-400 mt-6">© 2025 مركز وادي الشيخ - الصلوعاب</p>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="mainApp" style="display: none;">
    <div class="bg-gradient-to-l from-primary to-teal-700 text-white p-5 shadow-lg sticky top-0 z-20">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-extrabold"><i class="fas fa-clinic-medical ml-2"></i>مركز وادي الشيخ</h1>
                <p class="text-xs">مرحباً، <span id="currentUserName"></span></p>
            </div>
            <div class="flex gap-2">
                <button onclick="showUserManagement()" id="adminOnlyBtn" class="bg-white/20 p-2 rounded-full hidden"><i class="fas fa-users-cog"></i></button>
                <button onclick="showAddUserPanel()" id="addUserBtn" class="bg-white/20 p-2 rounded-full hidden"><i class="fas fa-user-plus"></i></button>
                <button onclick="logout()" class="bg-white/20 p-2 rounded-full"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </div>
    <main class="container mx-auto px-3 py-5" id="appContent">جاري تحميل البيانات...</main>
    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-gray-200 shadow-2xl rounded-t-3xl z-30">
        <div class="flex justify-around items-center p-2 flex-wrap">
            <button data-section="dashboard" class="nav-bottom-btn flex flex-col items-center p-2 rounded-2xl text-gray-600"><i class="fas fa-tachometer-alt"></i><span class="text-xs">الرئيسية</span></button>
            <button data-section="patients" class="nav-bottom-btn flex flex-col items-center p-2 rounded-2xl text-gray-600"><i class="fas fa-users"></i><span class="text-xs">المرضى</span></button>
            <button data-section="exams" class="nav-bottom-btn flex flex-col items-center p-2 rounded-2xl text-gray-600"><i class="fas fa-microscope"></i><span class="text-xs">فحوصات</span></button>
            <button data-section="inventory" class="nav-bottom-btn flex flex-col items-center p-2 rounded-2xl text-gray-600"><i class="fas fa-pills"></i><span class="text-xs">المخزون</span></button>
            <button data-section="accounting" class="nav-bottom-btn flex flex-col items-center p-2 rounded-2xl text-gray-600"><i class="fas fa-coins"></i><span class="text-xs">المالية</span></button>
            <button data-section="appointments" class="nav-bottom-btn flex flex-col items-center p-2 rounded-2xl text-gray-600"><i class="fas fa-calendar-check"></i><span class="text-xs">مواعيد</span></button>
            <button data-section="reports" class="nav-bottom-btn flex flex-col items-center p-2 rounded-2xl text-gray-600"><i class="fas fa-chart-simple"></i><span class="text-xs">تقارير</span></button>
        </div>
    </div>
</div>

<!-- مودال إضافة موظف -->
<div id="addUserPanel" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-11/12 max-w-md">
        <h3 class="font-bold text-xl mb-4">إضافة موظف جديد</h3>
        <input id="newUserFullname" placeholder="الاسم الكامل" class="w-full border p-3 rounded mb-2">
        <input id="newUserEmail" type="email" placeholder="البريد الإلكتروني" class="w-full border p-3 rounded mb-2">
        <input id="newUserPassword" type="password" placeholder="كلمة المرور" class="w-full border p-3 rounded mb-2">
        <input id="newUserConfirmPassword" type="password" placeholder="تأكيد كلمة المرور" class="w-full border p-3 rounded mb-2">
        <select id="newUserRole" class="w-full border p-3 rounded mb-4">
            <option value="user">موظف عادي</option>
            <option value="admin">مدير (صلاحية كاملة)</option>
        </select>
        <button onclick="addNewUser()" class="bg-primary text-white w-full py-2 rounded">إضافة</button>
        <button onclick="closeAddUserPanel()" class="bg-gray-300 w-full py-2 rounded mt-2">إلغاء</button>
    </div>
</div>

<!-- مودال إدارة المستخدمين -->
<div id="userManagementModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-5 w-11/12 max-w-lg">
        <h3 class="font-bold text-xl mb-4">إدارة المستخدمين</h3>
        <div id="usersList" class="max-h-96 overflow-y-auto mb-4"></div>
        <button onclick="closeUserManagement()" class="bg-gray-300 w-full py-2 rounded">إغلاق</button>
    </div>
</div>

<script>
    // ---------- المتغيرات العامة ----------
    let currentUser = null, userRole = null;
    let patients = [], inventory = [], invoices = [], appointments = [], examinations = [], usersList = [];
    let currentSection = 'dashboard';

    function showToast(msg, ok=true) {
        const t = document.createElement('div'); t.className = 'toast-success';
        t.style.background = ok ? '#0f766e' : '#b91c1c'; t.innerHTML = msg;
        document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
    }

    window.togglePassword = (id, iconId) => {
        let inp = document.getElementById(id), icon = document.getElementById(iconId);
        if (inp.type === 'password') { inp.type = 'text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
        else { inp.type = 'password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
    };

    window.showRegisterForm = () => { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); };
    window.hideRegisterForm = () => { document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('registerForm').classList.add('hidden'); };
    
    window.registerNewUser = async () => {
        const full = document.getElementById('regFullname').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const pass = document.getElementById('regPassword').value;
        const conf = document.getElementById('regConfirmPassword').value;
        if (!full || !email || !pass) return alert('جميع الحقول مطلوبة');
        if (pass !== conf) return alert('كلمة المرور غير متطابقة');
        if (pass.length < 6) return alert('كلمة المرور 6 أحرف على الأقل');
        try {
            const cred = await signUp(auth, email, pass);
            // حفظ البيانات بنفس أسماء الحقول المستخدمة في القاعدة (Full name, Email, Role)
            await set(ref(db, 'users/' + cred.user.uid), {
                'Full name': full,
                'Email': email,
                'Role': 'user'
            });
            showToast('✅ تم إنشاء الحساب بنجاح');
            hideRegisterForm();
        } catch(e) { alert('خطأ: ' + e.message); }
    };

    window.attemptLogin = () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) return alert('❌ الرجاء إدخال البريد الإلكتروني وكلمة المرور');
        signIn(auth, email, password).catch(e => alert('فشل تسجيل الدخول: ' + e.message));
    };

    window.logout = () => signOutUser(auth);

    window.showAddUserPanel = () => { if(userRole!=='admin') return; document.getElementById('addUserPanel').classList.remove('hidden'); };
    window.closeAddUserPanel = () => document.getElementById('addUserPanel').classList.add('hidden');
    window.closeUserManagement = () => document.getElementById('userManagementModal').classList.add('hidden');
    
    window.addNewUser = async () => {
        if(userRole!=='admin') return;
        const full = document.getElementById('newUserFullname').value.trim();
        const email = document.getElementById('newUserEmail').value.trim();
        const pass = document.getElementById('newUserPassword').value;
        const conf = document.getElementById('newUserConfirmPassword').value;
        const role = document.getElementById('newUserRole').value;
        if(!full||!email||!pass) return alert('كل الحقول مطلوبة');
        if(pass!==conf) return alert('كلمة المرور غير متطابقة');
        try {
            const cred = await signUp(auth, email, pass);
            await set(ref(db, 'users/' + cred.user.uid), {
                'Full name': full,
                'Email': email,
                'Role': role
            });
            showToast('✅ تم إضافة الموظف');
            closeAddUserPanel();
        } catch(e) { alert('خطأ: ' + e.message); }
    };

    window.showUserManagement = async () => {
        if(userRole!=='admin') return;
        const snap = await get(child(ref(db), 'users'));
        if(snap.exists()) usersList = Object.entries(snap.val()).map(([id,v])=>({id,...v}));
        document.getElementById('usersList').innerHTML = usersList.map(u=>`
            <div class="flex justify-between border-b p-2">
                <span>${u['Full name']} (${u['Role']})</span>
                ${u['Role']!=='admin' ? `<button onclick="deleteUser('${u.id}')" class="text-red-500">حذف</button>` : ''}
            </div>
        `).join('');
        document.getElementById('userManagementModal').classList.remove('hidden');
    };

    window.deleteUser = async (uid) => {
        if(confirm('حذف المستخدم؟')) { await remove(ref(db,'users/'+uid)); showToast('تم الحذف'); showUserManagement(); }
    };

    async function loadData() {
        const snap = await get(child(ref(db), '/'));
        if(snap.exists()) {
            const d = snap.val();
            patients = d.patients ? Object.entries(d.patients).map(([id,v])=>({id,...v})) : [];
            inventory = d.inventory ? Object.entries(d.inventory).map(([id,v])=>({id,...v})) : [];
            invoices = d.invoices ? Object.entries(d.invoices).map(([id,v])=>({id,...v})) : [];
            appointments = d.appointments ? Object.entries(d.appointments).map(([id,v])=>({id,...v})) : [];
            examinations = d.examinations ? Object.entries(d.examinations).map(([id,v])=>({id,...v})) : [];
        }
    }

    function listenRealtime() {
        const paths = ['patients','inventory','invoices','appointments','examinations'];
        paths.forEach(p => onValue(ref(db, p), (snap) => {
            const data = snap.val();
            if(p==='patients') patients = data ? Object.entries(data).map(([id,v])=>({id,...v})) : [];
            else if(p==='inventory') inventory = data ? Object.entries(data).map(([id,v])=>({id,...v})) : [];
            else if(p==='invoices') invoices = data ? Object.entries(data).map(([id,v])=>({id,...v})) : [];
            else if(p==='appointments') appointments = data ? Object.entries(data).map(([id,v])=>({id,...v})) : [];
            else if(p==='examinations') examinations = data ? Object.entries(data).map(([id,v])=>({id,...v})) : [];
            renderSection(currentSection);
        }));
    }

    function renderSection(s) {
        currentSection = s; const c = document.getElementById('appContent');
        if(s==='dashboard') c.innerHTML = renderDashboard();
        else if(s==='patients') c.innerHTML = renderPatients();
        else if(s==='exams') c.innerHTML = renderExams();
        else if(s==='inventory') c.innerHTML = renderInventory();
        else if(s==='accounting') c.innerHTML = renderAccounting();
        else if(s==='appointments') c.innerHTML = renderAppointments();
        else if(s==='reports') c.innerHTML = renderReports();
    }

    function renderDashboard() {
        const today = new Date().toISOString().slice(0,10);
        const todayRevenue = invoices.filter(i=>i.date===today && i.paid).reduce((a,b)=>a+b.total,0)||0;
        const monthRevenue = invoices.filter(i=>i.date?.startsWith(new Date().toISOString().slice(0,7)) && i.paid).reduce((a,b)=>a+b.total,0)||0;
        return `
            <div class="grid grid-cols-2 gap-3 p-4">
                <div class="bg-white p-4 rounded shadow"><p class="text-gray-500">المرضى</p><p class="text-2xl font-bold">${patients.length}</p></div>
                <div class="bg-white p-4 rounded shadow"><p class="text-gray-500">الأدوية</p><p class="text-2xl font-bold">${inventory.length}</p></div>
                <div class="bg-white p-4 rounded shadow"><p class="text-gray-500">إيرادات اليوم</p><p class="text-2xl font-bold">${todayRevenue} ج.س</p></div>
                <div class="bg-white p-4 rounded shadow"><p class="text-gray-500">إيرادات الشهر</p><p class="text-2xl font-bold">${monthRevenue} ج.س</p></div>
            </div>
            <div class="bg-white p-4 rounded shadow mt-4 text-center">👋 مرحباً ${currentUser?.['Full name'] || currentUser?.fullname} - ${userRole==='admin'?'مدير':'موظف'}</div>
        `;
    }

    function renderPatients() {
        return `
            <div class="p-4">
                ${userRole==='admin' ? `<button onclick="addPatientUI()" class="bg-primary text-white px-4 py-2 rounded">➕ مريض جديد</button>` : ''}
                <div class="mt-4 space-y-2">
                    ${patients.map(p=>`<div class="bg-white p-3 rounded shadow flex justify-between"><span>${p.name} - ${p.phone}</span>${userRole==='admin'?`<button onclick="deletePatient('${p.id}')" class="text-red-500">🗑️</button>`:''}</div>`).join('')}
                </div>
            </div>`;
    }

    function renderExams() {
        return `<div class="p-4">${userRole==='admin'?`<button onclick="addExamUI()" class="bg-primary text-white px-4 py-2 rounded">➕ فحص جديد</button>`:''}<div class="mt-4 space-y-2">${examinations.map(e=>`<div class="bg-white p-3 rounded shadow">${e.patientName} - ${e.type} : ${e.diagnosis||'قيد الانتظار'}</div>`).join('')}</div></div>`;
    }

    function renderInventory() {
        return `<div class="p-4">${userRole==='admin'?`<button onclick="addDrugUI()" class="bg-primary text-white px-4 py-2 rounded">➕ دواء جديد</button>`:''}<div class="mt-4 space-y-2">${inventory.map(d=>`<div class="bg-white p-3 rounded shadow">${d.name} - ${d.quantity} - ${d.price} ج.س</div>`).join('')}</div></div>`;
    }

    function renderAccounting() {
        return `<div class="p-4">${userRole==='admin'?`<button onclick="addInvoiceUI()" class="bg-primary text-white px-4 py-2 rounded">➕ فاتورة جديدة</button>`:''}<div class="mt-4 space-y-2">${invoices.map(i=>`<div class="bg-white p-3 rounded shadow flex justify-between"><span>${i.patientName} - ${i.total} ج.س ${i.paid?'✅':'⏳'}</span>${userRole==='admin'?`<button onclick="deleteInvoice('${i.id}')" class="text-red-500">🗑️</button>`:''}</div>`).join('')}</div></div>`;
    }

    function renderAppointments() {
        return `<div class="p-4">${userRole==='admin'?`<button onclick="addAppointmentUI()" class="bg-primary text-white px-4 py-2 rounded">➕ موعد جديد</button>`:''}<div class="mt-4 space-y-2">${appointments.map(a=>`<div class="bg-white p-3 rounded shadow">${a.patientName} - ${a.date} ${a.time}</div>`).join('')}</div></div>`;
    }

    function renderReports() {
        return `<div class="p-4 text-center"><button onclick="exportReport()" class="bg-gray-800 text-white px-6 py-3 rounded">📄 تصدير التقرير PDF</button></div>`;
    }

    // دوال الإضافة (مع مراعاة أسماء الحقول)
    window.addPatientUI = async () => {
        if(userRole!=='admin') return;
        const name=prompt('اسم المريض'), phone=prompt('الهاتف'), age=prompt('العمر');
        if(name && phone) {
            const id = Date.now().toString();
            await set(ref(db,'patients/'+id), {name, phone, age, createdAt: new Date().toISOString()});
            showToast('✅ تمت الإضافة');
        }
    };
    window.deletePatient = async (id) => {
        if(userRole!=='admin') return;
        if(confirm('حذف المريض؟')) { await remove(ref(db,'patients/'+id)); showToast('تم الحذف'); }
    };
    window.addDrugUI = async () => {
        if(userRole!=='admin') return;
        const name=prompt('اسم الدواء'), qty=prompt('الكمية'), price=prompt('السعر');
        if(name && qty) {
            const id = Date.now().toString();
            await set(ref(db,'inventory/'+id), {name, quantity:parseInt(qty), price:parseFloat(price)});
            showToast('✅ تمت الإضافة');
        }
    };
    window.addInvoiceUI = async () => {
        if(userRole!=='admin') return;
        const pname=prompt('اسم المريض'), total=prompt('المبلغ');
        if(pname && total) {
            const id = Date.now().toString();
            await set(ref(db,'invoices/'+id), {patientName:pname, total:parseFloat(total), date:new Date().toISOString().slice(0,10), paid:false});
            showToast('✅ تمت الإضافة');
        }
    };
    window.deleteInvoice = async (id) => {
        if(userRole!=='admin') return;
        if(confirm('حذف الفاتورة؟')) { await remove(ref(db,'invoices/'+id)); showToast('تم الحذف'); }
    };
    window.addAppointmentUI = async () => {
        if(userRole!=='admin') return;
        const pname=prompt('اسم المريض'), date=prompt('التاريخ (YYYY-MM-DD)'), time=prompt('الوقت');
        if(pname && date) {
            const id = Date.now().toString();
            await set(ref(db,'appointments/'+id), {patientName:pname, date, time});
            showToast('✅ تم الحجز');
        }
    };
    window.addExamUI = async () => {
        if(userRole!=='admin') return;
        const pname=prompt('اسم المريض'), type=prompt('نوع الفحص');
        if(pname && type) {
            const id = Date.now().toString();
            await set(ref(db,'examinations/'+id), {patientName:pname, type, diagnosis:''});
            showToast('✅ تمت الإضافة');
        }
    };
    window.exportReport = () => showToast('سيتم تصدير التقرير قريباً');

    // مراقبة المصادقة
    onAuthChange(auth, async (user) => {
        if(user) {
            const snap = await get(ref(db, 'users/' + user.uid));
            if(snap.exists()) {
                currentUser = {uid:user.uid, email:user.email, ...snap.val()};
                userRole = currentUser['Role'] || currentUser.role; // يدعم الحالتين
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('currentUserName').innerText = currentUser['Full name'] || currentUser.fullname;
                document.getElementById('adminOnlyBtn').classList.toggle('hidden', userRole!=='admin');
                document.getElementById('addUserBtn').classList.toggle('hidden', userRole!=='admin');
                await loadData();
                listenRealtime();
                renderSection('dashboard');
                document.querySelectorAll('.nav-bottom-btn').forEach(b => b.addEventListener('click', (e) => {
                    document.querySelectorAll('.nav-bottom-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    renderSection(b.dataset.section);
                }));
                document.querySelector('[data-section="dashboard"]').classList.add('active');
            } else {
                await signOutUser(auth);
                alert('حسابك غير مفعل. الرجاء التواصل مع المدير.');
            }
        } else {
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }
    });
</script>
</body>
</html>
